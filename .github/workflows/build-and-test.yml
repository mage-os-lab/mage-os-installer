name: Build, Test and Release

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  go-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Test
        run: go test -v ./...

  ddev-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: regular
            sample_data: "false"
            hyva: "false"
          - name: sampledata
            sample_data: "true"
            hyva: "false"
          - name: hyva
            sample_data: "false"
            hyva: "true"
          - name: hyva-sampledata
            sample_data: "true"
            hyva: "true"

    name: ddev-test (${{ matrix.name }})

    steps:
      # Skip Hyvä variants when secrets are not available
      - name: Check if this variant should run
        id: should-run
        run: |
          if [[ "${{ matrix.hyva }}" == "true" && -z "${{ secrets.HYVA_REPO_URL }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping Hyvä variant because HYVA_REPO_URL is not configured"
          fi

      - uses: actions/checkout@v4
        if: steps.should-run.outputs.skip != 'true'

      - name: Set up Go
        if: steps.should-run.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        if: steps.should-run.outputs.skip != 'true'
        run: go build -o mage-os-install .

      - name: Create .ddev/config.yaml
        if: steps.should-run.outputs.skip != 'true'
        run: |
          mkdir -p .ddev
          cat > .ddev/config.yaml << 'EOF'
          name: mage-os-install
          type: magento2
          docroot: pub
          EOF

      - name: Setup DDEV
        if: steps.should-run.outputs.skip != 'true'
        uses: ddev/github-action-setup-ddev@v1
        with:
          autostart: false

      - name: Run Mage-OS installer
        if: steps.should-run.outputs.skip != 'true'
        env:
          SAMPLE_DATA: ${{ matrix.sample_data }}
          HYVA: ${{ matrix.hyva }}
          HYVA_REPO_URL: ${{ secrets.HYVA_REPO_URL }}
          HYVA_AUTH_TOKEN: ${{ secrets.HYVA_AUTH_TOKEN }}
        run: |
          sudo apt-get install -y expect
          expect <<'EXPECT_EOF'
          set timeout 3600
          log_user 1

          set sample_data $env(SAMPLE_DATA)
          set hyva $env(HYVA)
          set hyva_repo_url $env(HYVA_REPO_URL)
          set hyva_auth_token $env(HYVA_AUTH_TOKEN)

          spawn ./mage-os-install

          # Clear default and type a custom project name so a fresh directory is used
          expect "Project name"
          puts ">>> Entering project name..."
          send "\025test-mageos\r"

          # Accept default install directory (will be ./test-mageos)
          expect "Install directory"
          puts ">>> Accepting install directory..."
          send "\r"

          # Setup config form - admin user is focused first (default: admin)
          expect "Configure"
          puts ">>> Filling in admin credentials..."
          send "\r"

          # Admin password (empty by default)
          sleep 0.5
          send "Admin123!"
          send "\r"

          # Admin email (empty by default)
          sleep 0.5
          send "admin@example.com"
          send "\r"

          # Admin firstname (default: Admin)
          sleep 0.5
          send "\r"

          # Admin lastname (default: User) - moves to sample data toggle
          sleep 0.5
          send "\r"

          # Sample data toggle
          sleep 0.3
          if { $sample_data eq "true" } {
            puts ">>> Enabling sample data..."
            send " "
          }
          send "\t"
          sleep 0.3

          # Hyvä toggle
          if { $hyva eq "true" } {
            puts ">>> Enabling Hyvä theme..."
            send " "
            sleep 0.2
            send "\t"
            sleep 0.2
            # Repo URL
            send "$hyva_repo_url"
            send "\t"
            sleep 0.2
            # Auth token
            send "$hyva_auth_token"
          }

          # Submit form
          sleep 0.3
          send "\r"

          # Setup preview - press enter to start install
          expect "Review"
          puts ">>> Starting installation..."
          send "\r"

          # Wait for installation to complete
          expect {
            -timeout 3600
            "installed successfully" {
              puts ">>> Installation completed successfully!"
              send "n"
            }
            "Installation failed" {
              puts ">>> Installation failed!"
              exit 1
            }
          }

          # Exit
          expect "Press enter"
          send "\r"

          expect eof
          EXPECT_EOF

      - name: Run bin/magento to verify installation
        if: steps.should-run.outputs.skip != 'true'
        run: |
          sleep 5
          ddev php bin/magento

      - name: Verify Mage-OS is running
        if: steps.should-run.outputs.skip != 'true'
        run: |
          HTTP_CODE=$(curl -sSk -L -D /tmp/curl-headers.txt -o /tmp/curl-body.txt -w "%{http_code}" https://test-mageos.ddev.site/)
          echo "------- Response headers -------"
          cat /tmp/curl-headers.txt
          echo "------- Response body -------"
          cat /tmp/curl-body.txt
          echo "------- Checking HTTP status code -------"
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "Expected 200, got $HTTP_CODE"; exit 1; }
          echo "------- Checking x-dist header -------"
          grep -qi "^x-dist:.*Mage-OS" /tmp/curl-headers.txt || { echo "Expected x-dist: Mage-OS header not found"; exit 1; }

      - name: Verify sample data (if enabled)
        if: steps.should-run.outputs.skip != 'true' && matrix.sample_data == 'true'
        run: |
          PRODUCT_COUNT=$(ddev exec bin/magento catalog:product:count 2>/dev/null || ddev mysql -N -e "SELECT COUNT(*) FROM catalog_product_entity")
          echo "Product count: $PRODUCT_COUNT"
          [ "$PRODUCT_COUNT" -gt 0 ] || { echo "Expected products from sample data, found none"; exit 1; }

      - name: Verify Hyvä theme (if enabled)
        if: steps.should-run.outputs.skip != 'true' && matrix.hyva == 'true'
        run: |
          THEME=$(ddev mysql -N -e "SELECT value FROM core_config_data WHERE path='design/theme/theme_id'")
          THEME_PATH=$(ddev mysql -N -e "SELECT theme_path FROM theme WHERE theme_id=$THEME")
          echo "Active theme: $THEME_PATH"
          [ "$THEME_PATH" = "Hyva/default" ] || { echo "Expected Hyva/default theme, got $THEME_PATH"; exit 1; }

  warden-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: regular
            sample_data: "false"
            hyva: "false"
          - name: sampledata
            sample_data: "true"
            hyva: "false"
          - name: hyva
            sample_data: "false"
            hyva: "true"
          - name: hyva-sampledata
            sample_data: "true"
            hyva: "true"

    name: warden-test (${{ matrix.name }})

    steps:
      # Skip Hyvä variants when secrets are not available
      - name: Check if this variant should run
        id: should-run
        run: |
          if [[ "${{ matrix.hyva }}" == "true" && -z "${{ secrets.HYVA_REPO_URL }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping Hyvä variant because HYVA_REPO_URL is not configured"
          fi

      - uses: actions/checkout@v4
        if: steps.should-run.outputs.skip != 'true'

      - name: Set up Go
        if: steps.should-run.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        if: steps.should-run.outputs.skip != 'true'
        run: go build -o mage-os-install .

      - name: Install Warden
        if: steps.should-run.outputs.skip != 'true'
        run: |
          sudo mkdir -p /opt/warden
          sudo chown $(whoami) /opt/warden
          git clone -b main https://github.com/wardenenv/warden.git /opt/warden
          echo "/opt/warden/bin" >> $GITHUB_PATH

      - name: Initialize Warden
        if: steps.should-run.outputs.skip != 'true'
        run: |
          /opt/warden/bin/warden install
          /opt/warden/bin/warden svc up

      - name: Add /etc/hosts entries
        if: steps.should-run.outputs.skip != 'true'
        run: |
          echo "127.0.0.1 app.test-mageos.test" | sudo tee -a /etc/hosts
          echo "127.0.0.1 test-mageos.test" | sudo tee -a /etc/hosts

      - name: Run Mage-OS installer
        if: steps.should-run.outputs.skip != 'true'
        env:
          SAMPLE_DATA: ${{ matrix.sample_data }}
          HYVA: ${{ matrix.hyva }}
          HYVA_REPO_URL: ${{ secrets.HYVA_REPO_URL }}
          HYVA_AUTH_TOKEN: ${{ secrets.HYVA_AUTH_TOKEN }}
        run: |
          sudo apt-get install -y expect
          expect <<'EXPECT_EOF'
          set timeout 3600
          log_user 1

          set sample_data $env(SAMPLE_DATA)
          set hyva $env(HYVA)
          set hyva_repo_url $env(HYVA_REPO_URL)
          set hyva_auth_token $env(HYVA_AUTH_TOKEN)

          spawn ./mage-os-install

          # Clear default and type a custom project name so a fresh directory is used
          expect "Project name"
          puts ">>> Entering project name..."
          send "\025test-mageos\r"

          # Accept default install directory (will be ./test-mageos)
          expect "Install directory"
          puts ">>> Accepting install directory..."
          send "\r"

          # Setup config form - admin user is focused first (default: admin)
          expect "Configure"
          puts ">>> Filling in admin credentials..."
          send "\r"

          # Admin password (empty by default)
          sleep 0.5
          send "Admin123!"
          send "\r"

          # Admin email (empty by default)
          sleep 0.5
          send "admin@example.com"
          send "\r"

          # Admin firstname (default: Admin)
          sleep 0.5
          send "\r"

          # Admin lastname (default: User) - moves to sample data toggle
          sleep 0.5
          send "\r"

          # Sample data toggle
          sleep 0.3
          if { $sample_data eq "true" } {
            puts ">>> Enabling sample data..."
            send " "
          }
          send "\t"
          sleep 0.3

          # Hyvä toggle
          if { $hyva eq "true" } {
            puts ">>> Enabling Hyvä theme..."
            send " "
            sleep 0.2
            send "\t"
            sleep 0.2
            # Repo URL
            send "$hyva_repo_url"
            send "\t"
            sleep 0.2
            # Auth token
            send "$hyva_auth_token"
          }

          # Submit form
          sleep 0.3
          send "\r"

          # Setup preview - press enter to start install
          expect "Review"
          puts ">>> Starting installation..."
          send "\r"

          # Wait for installation to complete
          expect {
            -timeout 3600
            "installed successfully" {
              puts ">>> Installation completed successfully!"
              send "n"
            }
            "Installation failed" {
              puts ">>> Installation failed!"
              exit 1
            }
          }

          # Exit
          expect "Press enter"
          send "\r"

          expect eof
          EXPECT_EOF

      - name: Run bin/magento to verify installation
        if: steps.should-run.outputs.skip != 'true'
        run: |
          sleep 5
          cd test-mageos
          /opt/warden/bin/warden env exec php-fpm bin/magento --version

      - name: Verify Mage-OS is running
        if: steps.should-run.outputs.skip != 'true'
        run: |
          HTTP_CODE=$(curl -sSk -L -D /tmp/curl-headers.txt -o /tmp/curl-body.txt -w "%{http_code}" https://app.test-mageos.test/)
          echo "------- Response headers -------"
          cat /tmp/curl-headers.txt
          echo "------- Response body -------"
          cat /tmp/curl-body.txt
          echo "------- Checking HTTP status code -------"
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "Expected 200, got $HTTP_CODE"; exit 1; }
          echo "------- Checking x-dist header -------"
          grep -qi "^x-dist:.*Mage-OS" /tmp/curl-headers.txt || { echo "Expected x-dist: Mage-OS header not found"; exit 1; }

      - name: Verify sample data (if enabled)
        if: steps.should-run.outputs.skip != 'true' && matrix.sample_data == 'true'
        run: |
          cd test-mageos
          PRODUCT_COUNT=$(/opt/warden/bin/warden env exec php-fpm bin/magento catalog:product:count 2>/dev/null || /opt/warden/bin/warden env exec php-fpm mysql -h db -u magento -pmagento magento -N -e "SELECT COUNT(*) FROM catalog_product_entity")
          echo "Product count: $PRODUCT_COUNT"
          [ "$PRODUCT_COUNT" -gt 0 ] || { echo "Expected products from sample data, found none"; exit 1; }

      - name: Verify Hyvä theme (if enabled)
        if: steps.should-run.outputs.skip != 'true' && matrix.hyva == 'true'
        run: |
          cd test-mageos
          THEME=$(/opt/warden/bin/warden env exec php-fpm mysql -h db -u magento -pmagento magento -N -e "SELECT value FROM core_config_data WHERE path='design/theme/theme_id'" 2>/dev/null)
          THEME_PATH=$(/opt/warden/bin/warden env exec php-fpm mysql -h db -u magento -pmagento magento -N -e "SELECT theme_path FROM theme WHERE theme_id=$THEME" 2>/dev/null)
          echo "Active theme: $THEME_PATH"
          [ "$THEME_PATH" = "Hyva/default" ] || { echo "Expected Hyva/default theme, got $THEME_PATH"; exit 1; }

      - name: Debug on failure
        if: failure() && steps.should-run.outputs.skip != 'true'
        run: |
          echo "------- Docker containers -------"
          docker ps -a
          echo "------- Warden .env -------"
          cat test-mageos/.env 2>/dev/null || echo "No .env found"
          echo "------- Docker logs (last 50 lines per container) -------"
          for c in $(docker ps -aq); do
            echo "=== Container: $(docker inspect --format '{{.Name}}' $c) ==="
            docker logs --tail 50 $c 2>&1 || true
          done

  release:
    runs-on: ubuntu-latest
    needs: [go-test, ddev-test, warden-test]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install GoReleaser
        run: go install github.com/goreleaser/goreleaser/v2@latest

      - name: Release
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
