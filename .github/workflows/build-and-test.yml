name: Build, Test and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build -v ./...

  go-test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Test
        run: go test -v ./...

  ddev-test:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        run: go build -o mage-os-install .

      - name: Create .ddev/config.yaml
        run: |
          mkdir -p .ddev
          cat > .ddev/config.yaml << 'EOF'
          name: mage-os-install
          type: magento2
          docroot: pub
          EOF

      - name: Setup DDEV
        uses: ddev/github-action-setup-ddev@v1
        with:
          autostart: false

      - name: Run Mage-OS installer
        run: |
          sudo apt-get install -y expect
          expect <<'EXPECT_EOF'
          set timeout 3600
          spawn ./mage-os-install

          # Clear default and type a custom project name so a fresh directory is used
          expect "Project name"
          send "\025test-mageos\r"

          # Accept default install directory (will be ./test-mageos)
          expect "Install directory"
          send "\r"

          # Setup config form - admin user is focused first (default: admin)
          expect "Configure"
          send "\r"

          # Admin password (empty by default)
          sleep 0.5
          send "Admin123!"
          send "\r"

          # Admin email (empty by default)
          sleep 0.5
          send "admin@example.com"
          send "\r"

          # Admin firstname (default: Admin)
          sleep 0.5
          send "\r"

          # Admin lastname (default: User) - last field, triggers validation
          sleep 0.5
          send "\r"

          # Setup preview - press enter to start install
          expect "Review"
          send "\r"

          # Wait for installation to complete
          expect {
            -timeout 3600
            "installed successfully" {
              send "n"
            }
            "Installation failed" {
              puts "Installation failed!"
              exit 1
            }
          }

          # Exit
          expect "Press enter"
          send "\r"

          expect eof
          EXPECT_EOF

      - name: Verify Mage-OS is running
        run: |
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -k https://test-mageos.ddev.site/)
          echo "HTTP status code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "Mage-OS is up and running!"
          else
            echo "Unexpected status: $HTTP_CODE"
            curl -vk https://test-mageos.ddev.site/ || true
            exit 1
          fi

  release:
    runs-on: ubuntu-latest
    needs: [go-test, ddev-test]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install GoReleaser
        run: go install github.com/goreleaser/goreleaser/v2@latest

      - name: Release
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
